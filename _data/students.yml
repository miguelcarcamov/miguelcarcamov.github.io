apply_steps:
  - id: explore
    title:
      en: Explore the research areas
      es: Revisa las áreas de investigación
    description:
      en: >-
        Read the research pages and software hub to see which topics fit your background and interests.
      es: >-
        Lee las páginas de investigación y el hub de software para ver qué temas se ajustan a tu
        formación e intereses.
    links:
      - label:
          en: Research areas
          es: Áreas de investigación
        url: /research/
      - label:
          en: Software
          es: Software
        url: /software/
      - label:
          en: Pyralysis work items (GitLab)
          es: Work items de Pyralysis (GitLab)
        url: https://gitlab.com/clirai/pyralysis/-/work_items
        external: true

  - id: pyralysis-issues
    title:
      en: Pick a Pyralysis issue (optional)
      es: Elige un issue de Pyralysis (opcional)
    description:
      en: >-
        Many thesis and RA projects start from a concrete task. Browse the Pyralysis work items on
        GitLab, find an open issue that fits your level, and tell me which one you'd like to work on.
      es: >-
        Muchos proyectos de tesis y ayudantía parten de una tarea concreta. Revisa los work items de
        Pyralysis en GitLab, elige un issue abierto acorde a tu nivel e indícame cuál te gustaría abordar.
    links:
      - label:
          en: Open Pyralysis work items
          es: Ver work items de Pyralysis
        url: https://gitlab.com/clirai/pyralysis/-/work_items
        external: true

  - id: email
    title:
      en: Send an introductory email
      es: Envía un correo de presentación
    description:
      en: >-
        Include a short CV, transcript (or GPA summary), relevant coursework, and a brief statement
        (½ page) on why the project interests you and what you hope to learn. If you picked a
        Pyralysis issue, mention it in the email.
      es: >-
        Incluye un CV breve, certificado de notas (o resumen de promedio), cursos relevantes y una
        declaración corta (½ página) sobre por qué te interesa el proyecto y qué esperas aprender.
        Si elegiste un issue de Pyralysis, menciónalo en el correo.

  - id: meet
    title:
      en: Meet to discuss fit
      es: Reunión para evaluar encaje
    description:
      en: >-
        We schedule a conversation (in person or online) to align expectations, timeline, and
        supervision arrangements with USACH degree requirements.
      es: >-
        Coordinamos una conversación (presencial u online) para alinear expectativas, plazos y
        modalidad de supervisión con los requisitos de tu programa en la USACH.

