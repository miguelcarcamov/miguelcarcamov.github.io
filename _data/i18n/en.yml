  info_total_papers: All journal + conference papers included after filtering and deduplication.
  info_total_citations: Sum of citation counts across all included papers.
  info_h_index: Largest h such that at least h papers have at least h citations.
  info_m_index: h-index divided by years since first publication.
  info_citation_velocity: Citations per effective paper-year over papers published in the last 5 years.
  info_momentum: Average of recent paper-share and recent citation-share over the last 5 years.
  info_flagship: Percent of total citations contributed by the five most-cited papers.
  info_open_access: Percent of included papers tagged as open access in ADS properties.
  info_code_linked: Included papers with linked research software or data assets on this site.
  info_venue_mix: Count of journal articles versus conference proceedings in the portfolio.
  info_first_author: Papers where Miguel Cárcamo is listed in author position 1.
  info_lead_author: Papers where Miguel is author position 1 or 2.
  info_lead_share: Percent of included papers where Miguel is author position 1 or 2.
  info_lead_citation_share: Percent of total citations attributed to papers where Miguel is author position 1 or 2.
  info_recent_lead: Lead-author papers published in the last 5 years, out of all lead-author papers.
  info_lead_cpp: Average citations per paper where Miguel is author position 1 or 2.
  info_leadership_ratio: Lead-role citations per paper divided by supporting-role citations per paper.
  info_fondecyt: Calculated from top-10 journal papers in the last 5 years using the ANID GE Astronomía y Astrofísica formula.
  info_intl_collab: Papers with two or more inferred affiliation countries among those with country signal.
  info_unique_coauthors: Distinct co-authors across all included papers, excluding Miguel (canonicalized names).
  info_avg_coauthors: Mean number of distinct co-authors per paper, excluding Miguel.
  info_repeat_collab: Co-authors who appear on more than one included paper, and their share of all unique co-authors.
  info_chart_papers_per_year: Annual count of included journal and conference papers.
  info_chart_citations_combo: Annual citations received per publication year, with cumulative total over time.
  info_chart_citation_distribution: Histogram of how many papers fall into each citation-count bin.
  info_chart_top_cited: Highest-cited papers in the included portfolio (ADS citation counts).
  info_chart_papers_by_role: Stacked annual counts — first author, lead co-author (position 2), and supporting (position 3+).
  info_chart_author_position: How often Miguel appears in each author position across included papers.
  info_chart_fondecyt: Top journal papers in the last 5 years ranked by s_i score in the ANID GE Astronomía y Astrofísica NP formula.
  info_chart_top_collaborators: Co-authors ranked by number of shared papers in the included portfolio.
  info_chart_collab_network: Interactive graph of top co-authors by shared papers. Filter by year or first-author papers; click a node for joint publications.
  info_chart_collab_map: Share of papers with inferred affiliation signal per country. Reflects collaboration geography, not author nationality.
