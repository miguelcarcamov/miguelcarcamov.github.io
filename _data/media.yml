    kind: interview
    year: 2021
    title:
      en: "Frecuencia Pública — Radio USACH interview"
      es: "Frecuencia Pública — entrevista Radio USACH"
    description:
      en: >-
        Interview on Radio USACH's Frecuencia Pública about cosmic magnetic fields,
        planet formation, and how big computing and big data help unravel open questions
