# Site Settings
title: "Miguel Cárcamo - Assistant Professor & Radio Astronomer"
description: "Assistant Professor at Universidad de Santiago de Chile, Associate Researcher at Data Observatory. Ph.D. in Astronomy and Astrophysics. Expert in radio interferometry, compressed sensing, cosmic magnetism, and high-performance computing."
url: "https://miguelcarcamov.github.io"
baseurl: ""

# Author
author:
  name: "Miguel Cárcamo"
  email: "miguel.carcamo@usach.cl"

# External integrations (Phase 4 placeholders)
substack_url: "https://thefaintsignal.substack.com/"
substack_feed_url: "https://thefaintsignal.substack.com/feed"
office_hours_url: ""

# Search Console (set this token after verification)
google_site_verification: "2QPOvGRD33gpzUngOgVDygqfT-VQDeXQpka0c29d_PI"
bing_site_verification: ""

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - DEPLOYMENT-CHECK.md
  - scripts/__pycache__
  - "**/__pycache__"

# Collections
collections:
  sections:
    output: false
  syllabi:
    output: true
    permalink: /teaching/courses/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "syllabi"
    values:
      layout: syllabus
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Miguel Cárcamo"

