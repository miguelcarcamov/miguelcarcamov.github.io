name: Sync NASA ADS Publications

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * 1"

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install requests pyyaml

      - name: Sync publications from NASA ADS
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
          ADS_ORCID: 0000-0003-0564-8167
        run: |
          python scripts/sync_ads_publications.py \
            --orcid "$ADS_ORCID" \
            --author "Carcamo, Miguel" \
            --author "Cárcamo, Miguel"

      - name: Commit updated publications data
        run: |
          if git diff --quiet -- _data/publications.yml _data/publication_stats.json; then
            echo "No publication/statistics updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml _data/publication_stats.json
          git commit -m "chore: sync publications and stats from NASA ADS"
          git push
