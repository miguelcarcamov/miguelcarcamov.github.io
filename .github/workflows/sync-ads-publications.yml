name: Sync Publications and Software Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * 1"

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install requests pyyaml

      - name: Sync publications from NASA ADS and Crossref
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
          ADS_ORCID: 0000-0003-0564-8167
          CROSSREF_MAILTO: miguel.carcamo@usach.cl
        run: |
          python scripts/sync_ads_publications.py \
            --orcid "$ADS_ORCID" \
            --author "Carcamo, Miguel" \
            --author "Cárcamo, Miguel"

      - name: Sync software releases
        run: python scripts/sync_software_releases.py
        continue-on-error: true

      - name: Sync software repository stats
        run: python scripts/sync_software_stats.py
        continue-on-error: true

      - name: Commit updated data files
        run: |
          if git diff --quiet -- \
            _data/publications.yml \
            _data/publication_stats.json \
            _data/software_releases.yml \
            _data/software_stats.yml; then
            echo "No publication, statistics, or software data updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            _data/publications.yml \
            _data/publication_stats.json \
            _data/software_releases.yml \
            _data/software_stats.yml
          git commit -m "chore: sync publications, software releases, and repo stats"
          git push
